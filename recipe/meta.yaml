{% set name = "alfasim-sdk" %}
{% set version = "1.5.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/alfasim_sdk-{{ version }}.tar.gz
  sha256: 4af754337b7366c4cc76053fbd542a70d9404a003f0fbd530169c3202ff96930

build:
  entry_points:
    - alfasim-sdk=alfasim_sdk:console_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0
    - pip
  run:
    - python >={{ python_min }}
    - attrs >=24.3.0
    - click >=7.0
    - barril >=1.13,<3.0
    - boltons
    - h5py
    - packaging
    - pluggy >=0.13.0
    - python-hookman
    # 1.4.3 seems to be the first version which bundles ruamel.
    - strictyaml >=1.4.3
    - typing_inspect

test:
  imports:
    - alfasim_sdk
  commands:
    - pip check
    - alfasim-sdk --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/esss/alfasim-sdk
  summary: ALFAsim API/SDK
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - cauebs
    - nicoddemus
    - prusse-martin
